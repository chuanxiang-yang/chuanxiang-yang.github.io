<script>
  const handler = document.getElementById('handler')
  const slider = document.getElementById("slider");
  const handler2 = document.getElementById('handler2')
  const slider2 = document.getElementById("slider2");

  slider.addEventListener("input", function (e) {
    tem = e.target.value
    if (tem < 12)
      tem = 12
    else if (tem > 80)
      tem = 80
    document.querySelector("#dragon_vrip").style.width =
      tem + "%";
    handler.style.left = tem + "%";
  });

  slider2.addEventListener("input", function (e) {
    tem = e.target.value
    if (tem < 9)
      tem = 9
    else if (tem > 88)
      tem = 88
    document.querySelector("#xyzrgb_dragon").style.width =
      tem + "%";
    handler2.style.left = tem + "%";

  });
</script>
